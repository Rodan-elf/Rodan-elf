<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(280px)} }
      @keyframes fade-in-1 { 0%{opacity:0} 40%{opacity:0} 100%{opacity:1} }
      @keyframes fade-in-2 { 0%{opacity:0} 60%{opacity:0} 100%{opacity:1} }
      @keyframes fade-in-3 { 0%{opacity:0} 80%{opacity:0} 100%{opacity:0.5} }
      .cursor { animation: blink 1s step-end infinite; }
      .scan-line { animation: scan 4s linear infinite; }
      .l1 { animation: fade-in-1 2s ease forwards; }
      .l2 { animation: fade-in-2 2.5s ease forwards; }
      .l3 { animation: fade-in-3 3s ease forwards; }
    </style>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a1a" stroke-width="0.5"/>
    </pattern>
    <!-- Scanline clip -->
    <clipPath id="clip-main">
      <rect width="900" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#090e09"/>
  <!-- Grid overlay -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Scan line effect -->
  <g clip-path="url(#clip-main)">
    <rect class="scan-line" x="0" y="-2" width="900" height="2" fill="#00ff41" opacity="0.04"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="280" fill="#00ff41" opacity="0.8"/>

  <!-- Top subtle line -->
  <line x1="3" y1="0" x2="900" y2="0" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom subtle line -->
  <line x1="3" y1="279" x2="900" y2="279" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner brackets top-left -->
  <path d="M20 20 L20 40 M20 20 L50 20" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Corner bracket top-right -->
  <path d="M880 20 L880 40 M880 20 L850 20" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Corner bracket bottom-left -->
  <path d="M20 260 L20 240 M20 260 L50 260" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Corner bracket bottom-right -->
  <path d="M880 260 L880 240 M880 260 L850 260" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Terminal header bar -->
  <rect x="20" y="20" width="860" height="22" rx="2" fill="#0f1f0f" opacity="0.8"/>
  <circle cx="36" cy="31" r="4" fill="#ff5f57"/>
  <circle cx="52" cy="31" r="4" fill="#febc2e"/>
  <circle cx="68" cy="31" r="4" fill="#28c840"/>
  <text x="450" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.5">rodan-elf@sentinel:~</text>

  <!-- Main name block -->
  <!-- RODAN in big blocky monospace -->
  <text x="50" y="110"
    font-family="monospace, 'Courier New', Courier"
    font-size="72"
    font-weight="bold"
    fill="#00ff41"
    letter-spacing="8"
    opacity="0.95">RODAN</text>

  <!-- ELF slightly offset and dimmer for depth -->
  <text x="54" y="162"
    font-family="monospace, 'Courier New', Courier"
    font-size="38"
    font-weight="bold"
    fill="#00ff41"
    letter-spacing="22"
    opacity="0.45">E L F</text>

  <!-- Vertical separator -->
  <line x1="490" y1="60" x2="490" y2="220" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

  <!-- Right side terminal output -->
  <text x="510" y="80" font-family="monospace" font-size="11" fill="#00ff41" opacity="0.4">$ whoami</text>

  <g class="l1">
    <text x="510" y="100" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">→ Cybersecurity Student</text>
    <text x="510" y="118" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">→ Threat Detection &amp; Analysis</text>
    <text x="510" y="136" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">→ Offensive + Defensive mindset</text>
  </g>

  <g class="l2">
    <text x="510" y="162" font-family="monospace" font-size="11" fill="#00ff41" opacity="0.4">$ tools --list</text>
    <text x="510" y="180" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">Python · SQL · Bash · osquery</text>
    <text x="510" y="197" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">MITRE ATT&amp;CK · NIST · Wireshark</text>
  </g>

  <g class="l3">
    <text x="510" y="224" font-family="monospace" font-size="11" fill="#00ff41" opacity="0.4">$ status</text>
    <text x="510" y="242" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.9">
      <tspan fill="#00ff41">●</tspan> online · learning · building
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="510" y="250" width="8" height="12" fill="#00ff41" opacity="0.8"/>

  <!-- Joined date bottom left -->
  <text x="30" y="260"
    font-family="monospace"
    font-size="9"
    fill="#00ff41"
    opacity="0.25"
    letter-spacing="2">// JOINED MARCH 2026</text>

  <!-- Subtle hex pattern bottom-right decorative -->
  <text x="840" y="255" font-family="monospace" font-size="8" fill="#00ff41" opacity="0.1">0x4345</text>

  <!-- Red threat indicator accent -->
  <rect x="860" y="55" width="3" height="60" rx="1" fill="#ff3333" opacity="0.6"/>
  <rect x="865" y="65" width="3" height="40" rx="1" fill="#ff3333" opacity="0.3"/>
</svg>
